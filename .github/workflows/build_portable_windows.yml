name: Build .NET Desktop Artifact

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  build_dotnet:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore AppPortable.sln

      - name: Build
        run: dotnet build AppPortable.sln --configuration Release --no-restore

      - name: Publish desktop
        run: dotnet publish AppPortable.Desktop/AppPortable.Desktop.csproj --configuration Release --no-build --runtime win-x64 --self-contained true -o artifacts/publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: appportable-dotnet-win-x64
          path: artifacts/publish
          if-no-files-found: error
