name: Build Windows Native EXE (.NET)

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "AppPortable.sln"
      - "AppPortable.Core/**"
      - "AppPortable.Desktop/**"
      - "AppPortable.Infrastructure/**"
      - "AppPortable.Search/**"
      - "scripts/build_portable_windows.bat"
      - ".github/workflows/build_portable_windows.yml"
  pull_request:
    paths:
      - "AppPortable.sln"
      - "AppPortable.Core/**"
      - "AppPortable.Desktop/**"
      - "AppPortable.Infrastructure/**"
      - "AppPortable.Search/**"
      - "scripts/build_portable_windows.bat"
      - ".github/workflows/build_portable_windows.yml"

jobs:
  build_windows_native:
    runs-on: windows-latest

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        shell: pwsh
        run: dotnet restore AppPortable.sln

      - name: Build
        shell: pwsh
        run: dotnet build AppPortable.sln -c Release --no-restore

      - name: Publish win-x64
        shell: pwsh
        run: |
          dotnet publish AppPortable.Desktop/AppPortable.Desktop.csproj -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true

      - name: Subir artefacto app native
        uses: actions/upload-artifact@v4
        with:
          name: AppPortable_windows_dotnet
          path: |
            AppPortable.Desktop/bin/Release/net8.0-windows/win-x64/publish/
          if-no-files-found: error
