name: Build Windows Portable EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "AppPortable.spec"
      - "launch_desktop.py"
      - "requirements-desktop.txt"
      - "indexador_documentos/**"
      - "assets/**"
      - "scripts/build_portable_windows.bat"
      - ".github/workflows/build_portable_windows.yml"
  pull_request:
    paths:
      - "AppPortable.spec"
      - "launch_desktop.py"
      - "requirements-desktop.txt"
      - "indexador_documentos/**"
      - "assets/**"
      - "scripts/build_portable_windows.bat"
      - ".github/workflows/build_portable_windows.yml"

jobs:
  build_windows_portable:
    runs-on: windows-latest

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias para build desktop
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-desktop.txt

      - name: Build App portable con PyInstaller
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean AppPortable.spec

      - name: Verificar EXE generado
        shell: pwsh
        run: |
          if (!(Test-Path "dist/AppPortable/AppPortable.exe")) {
            Write-Error "No se encontró dist/AppPortable/AppPortable.exe"
            exit 1
          }

      - name: Preparar carpetas de runtime
        shell: pwsh
        run: |
          New-Item -Path "dist/AppPortable/data/input" -ItemType Directory -Force | Out-Null
          New-Item -Path "dist/AppPortable/data/output" -ItemType Directory -Force | Out-Null
          New-Item -Path "dist/AppPortable/data/app_state" -ItemType Directory -Force | Out-Null
          New-Item -Path "dist/AppPortable/data/temp" -ItemType Directory -Force | Out-Null

      - name: Empaquetar app portable
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/AppPortable/*" -DestinationPath "dist/AppPortable.zip" -Force

      - name: Subir artefacto app portable
        uses: actions/upload-artifact@v4
        with:
          name: AppPortable_windows_portable
          path: |
            dist/AppPortable/
            dist/AppPortable.zip
          if-no-files-found: error
