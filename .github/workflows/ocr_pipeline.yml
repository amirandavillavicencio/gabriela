name: OCR Pipeline

on:
  workflow_dispatch:
    inputs:
      input_dir:
        description: "Carpeta del repositorio con PDFs"
        required: false
        default: "input"

jobs:
  ocr_pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias del sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            tesseract-ocr \
            tesseract-ocr-spa \
            poppler-utils

      - name: Instalar dependencias Python
        run: |
          python -m pip install --upgrade pip
          pip install -r indexador_documentos/requirements.txt

      - name: Verificar carpetas
        run: |
          mkdir -p "${{ github.event.inputs.input_dir || 'input' }}"
          mkdir -p output
          echo "Contenido de input:"
          ls -lah "${{ github.event.inputs.input_dir || 'input' }}" || true

      - name: Ejecutar pipeline OCR batch
        run: |
          python run_pipeline.py \
            --input-dir "${{ github.event.inputs.input_dir || 'input' }}" \
            --output-dir output

      - name: Subir resultados
        uses: actions/upload-artifact@v4
        with:
          name: resultado_ocr
          path: output/
          if-no-files-found: error
